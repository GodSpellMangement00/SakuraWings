<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura Wings</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  scroll-behavior:smooth;
}

body{
  background:linear-gradient(180deg,#fff5f8,#ffe6f0);
  color:#333;
}

section{
  min-height:100vh;
  padding:80px 10%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.hero{
  text-align:center;
}

.hero img{
  width:150px;
  height:150px;
  border-radius:50%;
  margin-bottom:20px;
  border:4px solid white;
}

.hero h1{
  font-size:3rem;
  color:#ff5c9f;
}

.hero p{
  margin-top:10px;
  color:#666;
}

h2{
  font-size:2rem;
  margin-bottom:30px;
  color:#ff5c9f;
}

.services, .projects{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
}

.card{
  flex:1 1 250px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.skill{
  margin-bottom:20px;
}

.skill-name{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

.bar{
  height:8px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#ffb7d5,#ff5c9f);
}
</style>
</head>

<body>

<section class="hero">
  <img src="assets/pfp3.jpeg">
  <h1>Sakura Wings</h1>
  <p>Debugging the Ecosystem.</p>
</section>

<section>
  <h2>Services</h2>
  <div class="services">
    <div class="card">Web Development</div>
    <div class="card">Discord Server Creation</div>
    <div class="card">Discord Server Management</div>
  </div>
</section>

<section>
  <h2>Skills</h2>

  <div class="skill">
    <div class="skill-name"><span>Python</span><span>90%</span></div>
    <div class="bar"><div class="fill" style="width:90%"></div></div>
  </div>

  <div class="skill">
    <div class="skill-name"><span>Web Development</span><span>85%</span></div>
    <div class="bar"><div class="fill" style="width:85%"></div></div>
  </div>

  <div class="skill">
    <div class="skill-name"><span>Discord Architecture</span><span>88%</span></div>
    <div class="bar"><div class="fill" style="width:88%"></div></div>
  </div>

</section>

<section>
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <img src="assets/image1.png" style="width:100%;border-radius:10px;margin-bottom:10px;">
      Premium Community Setup
    </div>
    <div class="card">
      Modern Business Website
    </div>
  </div>
</section>

<section>
  <h2>Contact</h2>
  <p>Discord: abinav_gamer (DeadSlot)</p>
</section>

</body>
</html>
